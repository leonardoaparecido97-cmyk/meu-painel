<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheto Master Pro - Gestão</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --bg: #0a0a0e; --card: #16161d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .hidden { display: none !important; }
        
        /* Stats e Filtros */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .card { background: var(--card); padding: 12px; border-radius: 10px; border: 1px solid #2d2d35; text-align: center; }
        .card h3 { font-size: 9px; color: #888; text-transform: uppercase; margin: 0; }
        .card p { font-size: 20px; font-weight: bold; margin: 5px 0 0 0; }

        /* Barra de Busca */
        .search-box { width: 100%; padding: 12px; background: var(--card); border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .filter-bar { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .f-btn { padding: 8px 15px; border-radius: 20px; border: 1px solid #333; background: #1f1f27; color: #888; font-size: 11px; cursor: pointer; white-space: nowrap; }
        .f-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Tabela */
        .table-container { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #2d2d35; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2d2d35; }
        th { background: #1f1f27; color: #aaa; }

        /* Modal */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c1c24; padding: 25px; border-radius: 20px; border: 1px solid var(--primary); width: 88%; max-width: 450px; z-index: 1000; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px 0; color: white; }
    </style>
</head>
<body>

    <div id="login-screen" style="max-width: 350px; margin: 50px auto; text-align: center;">
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="E-mail" style="width:100%; padding:12px; margin:8px 0; background:#16161d; border:1px solid #333; color:white; border-radius:8px;">
        <input type="password" id="pass" placeholder="Senha" style="width:100%; padding:12px; margin:8px 0; background:#16161d; border:1px solid #333; color:white; border-radius:8px;">
        <button class="btn" style="background:var(--primary)" onclick="fazerLogin()">ENTRAR</button>
    </div>

    <div id="main-content" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0;">PAINEL ELITE</h3>
            <button onclick="gerarChave()" style="background:var(--success); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">+ GERAR</button>
        </div>

        <div class="grid">
            <div class="card"><h3>Total</h3><p id="total">0</p></div>
            <div class="card"><h3>Ativas</h3><p id="ativas" style="color:var(--success)">0</p></div>
            <div class="card"><h3>Pends</h3><p id="pendentes" style="color:var(--warning)">0</p></div>
        </div>

        <input type="text" id="searchInput" class="search-box" placeholder="Buscar chave ou HWID..." onkeyup="filtrarTabela()">
        <div class="filter-bar">
            <button class="f-btn active" id="f-all" onclick="setFiltro('todos')">TODAS</button>
            <button class="f-btn" id="f-active" onclick="setFiltro('ativas')">ATIVAS</button>
            <button class="f-btn" id="f-pending" onclick="setFiltro('pendentes')">PENDENTES</button>
        </div>

        <div class="table-container">
            <table>
                <thead><tr><th>CHAVE</th><th>STATUS</th></tr></thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>

    <div id="overlay" onclick="fecharModal()"></div>
    <div id="modal">
        <h3 id="m-chave" style="color:var(--primary); margin:0 0 15px 0;">---</h3>
        <p style="font-size:12px;"><b>📱 HWID:</b> <span id="m-hwid" style="color:#888;">---</span></p>
        <p style="font-size:12px;"><b>⏳ Expira:</b> <span id="m-expira" style="color:#888;">---</span></p>
        <button class="btn" style="background:var(--primary)" onclick="alterarTempo()">ADD +30 DIAS</button>
        <button class="btn" style="background:var(--warning); color:#000;" onclick="resetarHWID()">RESETAR HWID</button>
        <button class="btn" style="background:var(--danger)" onclick="cancelarChave()">EXCLUIR CHAVE</button>
        <button class="btn" style="background:#444" onclick="fecharModal()">FECHAR</button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAHTGthgkjp4Inqf6p2EpNYZ5pV1iOc6wQ",
          authDomain: "poolvipseguro.firebaseapp.com",
          databaseURL: "https://poolvipseguro-default-rtdb.firebaseio.com",
          projectId: "poolvipseguro",
          storageBucket: "poolvipseguro.firebasestorage.app",
          messagingSenderId: "628193855101",
          appId: "1:628193855101:web:6e51e13dc44fdc00a01314"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        let dadosCompletos = {};
        let filtroAtual = 'todos';
        let chaveAtual = "";

        function fazerLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Erro: " + err.message));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                carregarDados();
            }
        });

        function carregarDados() {
            db.ref("keys").on("value", (snap) => {
                dadosCompletos = snap.val();
                renderizarTabela();
            });
        }

        function setFiltro(tipo) {
            filtroAtual = tipo;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('f-' + (tipo === 'todos' ? 'all' : tipo === 'ativas' ? 'active' : 'pending')).classList.add('active');
            renderizarTabela();
        }

        function renderizarTabela() {
            const busca = document.getElementById('searchInput').value.toLowerCase();
            let t = 0, a = 0, p = 0, html = "";

            for (let id in dadosCompletos) {
                let item = dadosCompletos[id];
                let ativa = (item.hwid && item.hwid !== "" && item.hwid !== "Livre");
                
                // Contadores globais
                t++; if(ativa) a++; else p++;

                // Lógica de Filtro
                let matchesFiltro = (filtroAtual === 'todos') || (filtroAtual === 'ativas' && ativa) || (filtroAtual === 'pendentes' && !ativa);
                let matchesBusca = id.toLowerCase().includes(busca) || (item.hwid && item.hwid.toLowerCase().includes(busca));

                if (matchesFiltro && matchesBusca) {
                    html += `<tr onclick="abrirModal('${id}', '${item.hwid || 'Livre'}', '${item.expira || '24h'}')">
                        <td><b>${id}</b></td>
                        <td style="color:${ativa?'#00ff88':'#ffcc33'}">${ativa?'ATIVA':'PEND'}</td>
                    </tr>`;
                }
            }
            document.getElementById("tabela-corpo").innerHTML = html;
            document.getElementById("total").innerText = t;
            document.getElementById("ativas").innerText = a;
            document.getElementById("pendentes").innerText = p;
        }

        function filtrarTabela() { renderizarTabela(); }

        function abrirModal(id, hwid, exp) {
            chaveAtual = id;
            document.getElementById("m-chave").innerText = id;
            document.getElementById("m-hwid").innerText = hwid;
            document.getElementById("m-expira").innerText = exp;
            document.getElementById("modal").style.display = "block";
            document.getElementById("overlay").style.display = "block";
        }

        function fecharModal() { document.getElementById("modal").style.display = "none"; document.getElementById("overlay").style.display = "none"; }

        function resetarHWID() {
            db.ref("keys/" + chaveAtual + "/hwid").set("").then(() => { alert("HWID Resetado!"); fecharModal(); });
        }

        function cancelarChave() {
            if(confirm("Excluir definitivamente?")) { db.ref("keys/" + chaveAtual).remove().then(() => fecharModal()); }
        }

        function alterarTempo() {
            db.ref("keys/" + chaveAtual + "/expira").set("30 Dias").then(() => { alert("Tempo Alterado!"); fecharModal(); });
        }

        function gerarChave() {
            const k = "CHETO-" + Math.random().toString(36).substring(2, 9).toUpperCase();
            db.ref("keys/" + k).set({ hwid: "", expira: "24h" });
        }
    </script>
</body>
</html>
