<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheto Master Pro - Gestão</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        body { background: #0a0a0e; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .hidden { display: none !important; }
        /* Dashboard */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .card { background: #16161d; padding: 15px; border-radius: 10px; border: 1px solid #2d2d35; text-align: center; }
        .card h3 { font-size: 10px; color: #888; text-transform: uppercase; margin: 0; }
        .card p { font-size: 22px; font-weight: bold; margin: 5px 0 0 0; }
        /* Tabela */
        table { width: 100%; border-collapse: collapse; background: #16161d; border-radius: 10px; overflow: hidden; font-size: 13px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2d2d35; }
        th { background: #1f1f27; color: #aaa; }
        tr:active { background: #252530; }
        /* Modal */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c1c24; padding: 25px; border-radius: 15px; border: 2px solid #007bff; width: 85%; z-index: 1000; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px 0; width: 100%; }
        .log-box { background: #000; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 10px; color: #00ff88; margin-top: 10px; max-height: 80px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="login-screen" style="text-align: center; margin-top: 50px;">
        <h2>Acesso Restrito</h2>
        <input type="email" id="email" placeholder="E-mail" style="width:80%; padding:10px; margin:5px; border-radius:5px;">
        <input type="password" id="pass" placeholder="Senha" style="width:80%; padding:10px; margin:5px; border-radius:5px;">
        <button class="btn" style="background:#007bff; color:white; width:85%;" onclick="fazerLogin()">ENTRAR NO PAINEL</button>
    </div>

    <div id="main-content" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0;">CHETO MASTER PRO</h2>
            <button onclick="gerarChave()" style="background:#28a745; color:white; border:none; padding:8px 12px; border-radius:5px;">+ NOVA</button>
        </div>

        <div class="grid">
            <div class="card"><h3>Total</h3><p id="total">0</p></div>
            <div class="card"><h3>Ativas</h3><p id="ativas" style="color:#00ff88;">0</p></div>
            <div class="card"><h3>Pends</h3><p id="pendentes" style="color:#ffcc33;">0</p></div>
        </div>

        <table>
            <thead><tr><th>CHAVE</th><th>STATUS</th><th>VENCIMENTO</th></tr></thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>

    <div id="overlay" onclick="fecharModal()"></div>
    <div id="modal">
        <h3 id="m-chave" style="color:#007bff; margin:0;">---</h3>
        <p style="font-size:12px; color:#888;">HWID: <span id="m-hwid">---</span></p>
        <p style="font-size:12px;">Expira em: <span id="m-expira">---</span></p>
        
        <button class="btn" style="background:#007bff; color:white;" onclick="alterarTempo(720)">+ 30 DIAS</button>
        <button class="btn" style="background:#ffcc33; color:black;" onclick="resetarHWID()">RESETAR DISPOSITIVO</button>
        <button class="btn" style="background:#ff4444; color:white;" onclick="cancelarChave()">EXCLUIR CHAVE</button>
        
        <div class="log-box" id="m-log">Aguardando log...</div>
        <button class="btn" style="background:#444; color:white; margin-top:15px;" onclick="fecharModal()">FECHAR</button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAHTGthgkjp4Inqf6p2EpNYZ5pV1iOc6wQ",
          authDomain: "poolvipseguro.firebaseapp.com",
          databaseURL: "https://poolvipseguro-default-rtdb.firebaseio.com",
          projectId: "poolvipseguro",
          storageBucket: "poolvipseguro.firebasestorage.app",
          messagingSenderId: "628193855101",
          appId: "1:628193855101:web:6e51e13dc44fdc00a01314"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let chaveAtual = "";

        function fazerLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Erro: " + err.message));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                carregarDados();
            }
        });

        function carregarDados() {
            db.ref("keys").on("value", (snap) => {
                const data = snap.val();
                let t = 0, a = 0, p = 0, html = "";
                for (let id in data) {
                    t++;
                    let item = data[id];
                    let ativa = (item.hwid && item.hwid !== "");
                    if(ativa) a++; else p++;
                    
                    html += `<tr onclick="abrirModal('${id}', '${item.hwid || 'Livre'}', '${item.expira || '24h'}')">
                        <td><b>${id}</b></td>
                        <td style="color:${ativa?'#00ff88':'#ffcc33'}">${ativa?'ATIVA':'PEND'}</td>
                        <td>${item.expira || '---'}</td>
                    </tr>`;
                }
                document.getElementById("tabela-corpo").innerHTML = html;
                document.getElementById("total").innerText = t;
                document.getElementById("ativas").innerText = a;
                document.getElementById("pendentes").innerText = p;
            });
        }

        function abrirModal(id, hwid, exp) {
            chaveAtual = id;
            document.getElementById("m-chave").innerText = id;
            document.getElementById("m-hwid").innerText = hwid;
            document.getElementById("m-expira").innerText = exp;
            
            // Busca log na pasta 'registros'
            db.ref("registros/" + id).once("value", s => {
                document.getElementById("m-log").innerText = s.val() || "Sem histórico de login.";
            });

            document.getElementById("modal").style.display = "block";
            document.getElementById("overlay").style.display = "block";
        }

        function fecharModal() { document.getElementById("modal").style.display = "none"; document.getElementById("overlay").style.display = "none"; }

        function resetarHWID() {
            db.ref("keys/" + chaveAtual + "/hwid").set("").then(() => { alert("Dispositivo liberado!"); fecharModal(); });
        }

        function cancelarChave() {
            if(confirm("Excluir definitivamente?")) {
                db.ref("keys/" + chaveAtual).remove().then(() => fecharModal());
            }
        }

        function alterarTempo(h) {
            db.ref("keys/" + chaveAtual + "/expira").set("30 Dias").then(() => { alert("Tempo Alterado!"); fecharModal(); });
        }

        function gerarChave() {
            const k = "CHETO-" + Math.random().toString(36).substring(2, 9).toUpperCase();
            db.ref("keys/" + k).set({ hwid: "", expira: "24h" });
        }
    </script>
</body>
</html>
