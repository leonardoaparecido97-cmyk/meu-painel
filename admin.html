<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gestão Elite v8 - Bloqueio Vendedor</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --yellow: #d29922; --red: #da3633; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 8px; text-align: center; }
        .stat-card h4 { margin: 0; font-size: 10px; color: #8b949e; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0 0; font-size: 18px; font-weight: bold; }

        #bulk-bar { display: flex; align-items: center; justify-content: space-between; background: var(--blue); color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 12px; }

        .control-panel { background: var(--card); padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; }
        input, select { background: #0d1117; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 13px; margin-bottom: 5px; }
        
        .filter-group { display: flex; gap: 5px; margin: 10px 0; overflow-x: auto; padding-bottom: 5px; }
        .f-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: #8b949e; cursor: pointer; font-size: 11px; white-space: nowrap; }
        .f-btn.active { background: var(--blue); color: white; border-color: var(--blue); }

        .table-res { overflow-x: auto; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 750px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .status-badge { padding: 2px 8px; border-radius: 10px; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--blue); }

        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 99; backdrop-filter: blur(3px); }
        #modal { display: none; position: fixed; top:50%; left:50%; transform: translate(-50%, -50%); background: #161b22; width: 92%; max-width: 450px; border-radius: 12px; border: 1px solid var(--border); z-index: 100; padding: 20px; max-height: 90vh; overflow-y: auto; }
        .row-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; border-bottom: 1px solid #21262d; padding-bottom: 4px; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .log-box { background: #000; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 10px; color: #00ff88; margin-top: 10px; max-height: 80px; overflow-y: auto; border: 1px solid #333; }
        .lista-hwids-teste { background: #0d1117; padding: 10px; border-radius: 6px; font-size: 10px; max-height: 120px; overflow-y: auto; color: #c9d1d9; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="login-screen" style="max-width:320px; margin: 80px auto; text-align: center;">
        <h2 style="color: var(--blue);">Cheto Master Login</h2>
        <input type="email" id="email" placeholder="E-mail" style="margin-bottom:10px;">
        <input type="password" id="pass" placeholder="Senha" style="margin-bottom:10px;">
        <button class="btn-action" style="background: var(--blue); color: white;" onclick="fazerLogin()">ENTRAR NO PAINEL</button>
    </div>

    <div id="main-content" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <span id="user-welcome" style="font-size: 11px; color: var(--blue);">Aguardando...</span>
            <button onclick="auth.signOut().then(()=>location.reload())" style="background:none; border:none; color:var(--red); font-size:10px; cursor:pointer;">[ Sair ]</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h4>Total</h4><p id="total">0</p></div>
            <div class="stat-card"><h4>Ativas</h4><p id="ativas" style="color: var(--green)">0</p></div>
            <div class="stat-card"><h4>Pendentes</h4><p id="pendentes" style="color: var(--yellow)">0</p></div>
            <div class="stat-card"><h4>Expiradas</h4><p id="expiradas" style="color: var(--red)">0</p></div>
        </div>

        <div id="bulk-bar" class="hidden">
            <span id="bulk-text">0 selecionadas</span>
            <button onclick="deleteSelected()" style="background: white; color: var(--red); border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer;">🗑️ APAGAR SELECIONADAS</button>
        </div>

        <div class="control-panel">
            <div style="display: flex; gap: 8px;">
                <input type="text" id="searchInput" placeholder="Buscar por chave ou usuário..." onkeyup="renderizarTabela()">
                <button onclick="gerarChaveComTempo()" style="background:var(--green); border:none; color:white; padding:0 15px; border-radius:8px; font-weight:bold; cursor:pointer;">+ GERAR</button>
                <button onclick="gerarChaveTeste()" style="background:var(--blue); border:none; color:white; padding:0 15px; border-radius:8px; font-weight:bold; cursor:pointer;">+ CRIAR TESTE</button>
            </div>

            <div class="filter-group">
                <button class="f-btn active" id="f-todos" onclick="setFiltroStatus('todos')">TODAS</button>
                <button class="f-btn" id="f-ativas" onclick="setFiltroStatus('ativas')">ATIVAS</button>
                <button class="f-btn" id="f-pendentes" onclick="setFiltroStatus('pendentes')">PENDENTES</button>
                <button class="f-btn" id="f-expiradas" onclick="setFiltroStatus('expiradas')">EXPIRADAS</button>
            </div>

            <div id="admin-seller-area" class="hidden">
                <select id="sellerFilter" onchange="renderizarTabela()">
                    <option value="todos">Todos os Vendedores</option>
                </select>
            </div>
        </div>

        <div class="table-res">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox" id="selectAll" onclick="toggleAll()"></th>
                        <th>CHAVE</th><th>USUÁRIO</th><th>STATUS</th><th>VENCIMENTO</th><th>AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>

    <div id="overlay" onclick="fecharModal()"></div>
    <div id="modal">
        <h3 id="m-key" style="color: var(--blue); margin: 0 0 15px 0;">CHAVE</h3>
        <div class="row-info"><label>Vendedor:</label><span id="m-vendedor" style="color: var(--yellow)">---</span></div>
        <div class="row-info"><label>Status:</label><span id="m-status">---</span></div>
        <div class="row-info"><label>HWID:</label><span id="m-hwid" style="font-size:10px; color: #888;">---</span></div>
        <div class="row-info"><label>Vencimento:</label><span id="m-exp-txt">---</span></div>

        <div style="margin-top:15px; border-top: 1px solid var(--border); padding-top: 10px;">
            
            <div id="area-normal-config">
                <label style="font-size:11px; color:#8b949e;">Dono / Usuário:</label>
                <input type="text" id="new-user" placeholder="Nome do cliente">
                
                <label style="font-size:11px; color:#8b949e;">Adicionar Tempo:</label>
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <input type="number" id="ext-val" value="1">
                    <select id="ext-unit">
                        <option value="min">Minutos</option><option value="hor">Horas</option><option value="dia">Dias</option>
                    </select>
                </div>
                <button class="btn-action" style="background: var(--green); color: white;" onclick="salvarAlteracoes()">SALVAR ALTERAÇÕES</button>
            </div>

            <div id="area-teste-config" style="display:none; margin-bottom: 10px;">
                <label style="font-size:11px; color:#8b949e;">Limite Máximo de Aparelhos:</label>
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <input type="number" id="m-max-disp">
                    <button class="btn-action" style="background: var(--blue); color: white; width:auto; margin:0;" onclick="salvarLimiteTeste()">Atualizar Limite</button>
                </div>
                <label style="font-size:11px; color:#8b949e; display:block;">Celulares Testando (HWIDs Individuais):</label>
                <div id="m-lista-hwids" class="lista-hwids-teste">Carregando...</div>
            </div>

            <button class="btn-action" style="background: var(--yellow); color: black;" onclick="resetarHwid()">RESETAR DISPOSITIVO (HWID)</button>
            <button class="btn-action" id="btn-del-single" style="background: var(--red); color: white; display: none;" onclick="excluirChave()">EXCLUIR ESTA CHAVE</button>
            
            <label style="font-size:11px; color:#8b949e; display:block; margin-top:15px;">Histórico de Log Global:</label>
            <div id="m-log" class="log-box">Aguardando...</div>
        </div>
        <button class="btn-action" style="background: #333; color: white;" onclick="fecharModal()">FECHAR</button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAHTGthgkjp4Inqf6p2EpNYZ5pV1iOc6wQ",
          authDomain: "poolvipseguro.firebaseapp.com",
          databaseURL: "https://poolvipseguro-default-rtdb.firebaseio.com",
          projectId: "poolvipseguro",
          storageBucket: "poolvipseguro.firebasestorage.app",
          messagingSenderId: "628193855101",
          appId: "1:628193855101:web:6e51e13dc44fdc00a01314"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        const ADMIN_EMAIL = "suno69644@gmail.com"; 

        let dadosLocais = {};
        let selectedKeys = new Set();
        let filtroStatus = 'todos';
        let chaveAberta = "";

        function fazerLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Erro: " + err.message));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-welcome').innerText = "Logado como: " + user.email;
                if(user.email === ADMIN_EMAIL) document.getElementById('admin-seller-area').classList.remove('hidden');
                carregarDados();
            }
        });

        function carregarDados() {
            db.ref("keys").on("value", (snap) => {
                dadosLocais = snap.val() || {};
                renderizarTabela();
            });
        }

        function setFiltroStatus(s) {
            filtroStatus = s;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('f-' + s).classList.add('active');
            renderizarTabela();
        }

        function renderizarTabela() {
            const userLogado = auth.currentUser.email;
            const isAdmin = (userLogado === ADMIN_EMAIL);
            const busca = document.getElementById('searchInput').value.toLowerCase();
            const filtroVendedor = document.getElementById('sellerFilter').value;
            const agora = Date.now();
            let t=0, a=0, e=0, p=0, html="";
            let vendedores = new Set();

            const keys = Object.keys(dadosLocais).sort((x,y) => (dadosLocais[y].criada_em || 0) - (dadosLocais[x].criada_em || 0));

            for (let id of keys) {
                let item = dadosLocais[id];
                let vend = item.vendedor || "Sistema";
                if(item.vendedor) vendedores.add(item.vendedor);

                let t_exp = item.timestamp_exp || 0;
                let expirada = (t_exp > 0 && agora > t_exp);
                let ativa = (item.usuario || item.hwid) && !expirada;
                let pendente = (!ativa && !expirada);
                
                let exibirHwid = item.usuario || '---';

                if(item.tipo === "multi_teste") {
                    ativa = true; pendente = false; expirada = false;
                    const hwids = item.hwids_liberados || {};
                    const usados = Object.keys(hwids).filter(k => k !== 'admin_init').length;
                    exibirHwid = `<span style="color:#888;">[TESTE] ${usados}/${item.max_dispositivos||9999} Aparelhos</span>`;
                }

                if (!isAdmin && vend !== userLogado) continue;
                if (isAdmin && filtroVendedor !== "todos" && vend !== filtroVendedor) continue;
                if (filtroStatus === 'ativas' && !ativa) continue;
                if (filtroStatus === 'pendentes' && !pendente) continue;
                if (filtroStatus === 'expiradas' && !expirada) continue;
                if (busca && !id.toLowerCase().includes(busca) && !(item.usuario && item.usuario.toLowerCase().includes(busca))) continue;

                if(expirada) e++; else if(ativa) a++; else p++;
                t++;

                html += `<tr>
                    <td><input type="checkbox" class="key-cb" value="${id}" ${selectedKeys.has(id)?'checked':''} onclick="updateBulk()"></td>
                    <td><b>${id}</b></td>
                    <td style="color:var(--blue)">${exibirHwid}</td>
                    <td><span class="status-badge" style="background:${expirada?'var(--red)':ativa?'var(--green)':'var(--yellow)'}">${expirada?'Exp':ativa?'Ativa':'Pend'}</span></td>
                    <td style="color:#8b949e; font-size:10px;">${item.expira || 'N/A'}</td>
                    <td><button onclick="abrirModal('${id}')" style="background:#333; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">⚙️</button></td>
                </tr>`;
            }

            if(isAdmin) {
                const sel = document.getElementById('sellerFilter');
                const val = sel.value;
                sel.innerHTML = '<option value="todos">Todos os Vendedores</option>';
                vendedores.forEach(v => sel.innerHTML += `<option value="${v}" ${val===v?'selected':''}>${v}</option>`);
            }

            document.getElementById("total").innerText = t; document.getElementById("ativas").innerText = a;
            document.getElementById("expiradas").innerText = e; document.getElementById("pendentes").innerText = p;
            document.getElementById("tabela-corpo").innerHTML = html;
            updateBulk();
        }

        function toggleAll() {
            const master = document.getElementById('selectAll');
            document.querySelectorAll('.key-cb').forEach(c => { c.checked = master.checked; if(master.checked) selectedKeys.add(c.value); else selectedKeys.delete(c.value); });
            updateBulk();
        }

        function updateBulk() {
            const isAdmin = (auth.currentUser.email === ADMIN_EMAIL);
            const checks = document.querySelectorAll('.key-cb:checked');
            selectedKeys.clear(); checks.forEach(c => selectedKeys.add(c.value));
            const bar = document.getElementById('bulk-bar');
            if(selectedKeys.size > 0 && isAdmin) { bar.classList.remove('hidden'); document.getElementById('bulk-text').innerText = selectedKeys.size + " selecionadas"; } else { bar.classList.add('hidden'); }
        }

        async function deleteSelected() {
            if(auth.currentUser.email !== ADMIN_EMAIL) return alert("ERRO: Apenas admin.");
            if(confirm("Apagar " + selectedKeys.size + " chaves?")) {
                for (let id of selectedKeys) await db.ref("keys/" + id).remove();
                selectedKeys.clear(); alert("Limpeza concluída!");
            }
        }

        function abrirModal(id) {
            chaveAberta = id;
            let item = dadosLocais[id];
            
            document.getElementById("m-key").innerText = id;
            document.getElementById("m-vendedor").innerText = item.vendedor || "Admin";
            document.getElementById("m-exp-txt").innerText = item.expira || "N/A";
            
            if(item.tipo === "multi_teste") {
                document.getElementById("m-status").innerText = `Pública (${item.tempo_minutos} min por pessoa)`;
                document.getElementById("area-normal-config").style.display = "none";
                document.getElementById("area-teste-config").style.display = "block";
                
                document.getElementById("m-max-disp").value = item.max_dispositivos || 9999;
                
                const hwids = item.hwids_liberados || {};
                const usados = Object.keys(hwids).filter(k => k !== 'admin_init');
                document.getElementById("m-hwid").innerText = usados.length + " Dispositivos Usando";
                
                let htmlLista = "";
                if(usados.length === 0) htmlLista = "Nenhum aparelho logou ainda.";
                usados.forEach(h => {
                    const taExpirado = Date.now() > hwids[h];
                    const dataExpira = new Date(hwids[h]).toLocaleString('pt-BR');
                    htmlLista += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; border-bottom:1px solid #222; padding-bottom:5px;">
                        <span style="color:var(--blue)">ID: ${h}</span>
                        <span style="color:${taExpirado ? 'var(--red)' : 'var(--green)'}">${taExpirado ? 'Expirou' : 'Até: '+dataExpira}</span>
                    </div>`;
                });
                document.getElementById("m-lista-hwids").innerHTML = htmlLista;
                
            } else {
                document.getElementById("m-status").innerText = (item.usuario || item.hwid ? "Ativa" : "Pendente");
                document.getElementById("m-hwid").innerText = item.hwid || "Livre";
                document.getElementById("new-user").value = item.usuario || "";
                
                document.getElementById("area-normal-config").style.display = "block";
                document.getElementById("area-teste-config").style.display = "none";
            }
            
            db.ref("registros/" + id).once("value", s => document.getElementById("m-log").innerText = s.val() || "Sem histórico.");
            document.getElementById("btn-del-single").style.display = (auth.currentUser.email === ADMIN_EMAIL) ? "block" : "none";
            document.getElementById("modal").style.display = "block";
            document.getElementById("overlay").style.display = "block";
        }

        function salvarAlteracoes() {
            const user = document.getElementById("new-user").value;
            const val = parseInt(document.getElementById("ext-val").value);
            const unit = document.getElementById("ext-unit").value;
            let ms = (unit === 'min') ? val * 60000 : (unit === 'hor') ? val * 3600000 : val * 86400000;
            const novaExp = (dadosLocais[chaveAberta].timestamp_exp || Date.now()) + ms;
            db.ref("keys/" + chaveAberta).update({ usuario: user, timestamp_exp: novaExp, expira: new Date(novaExp).toLocaleString('pt-BR') }).then(() => { alert("Atualizado!"); fecharModal(); });
        }

        function salvarLimiteTeste() {
            const novoMax = parseInt(document.getElementById("m-max-disp").value);
            if(isNaN(novoMax)) return;
            db.ref("keys/" + chaveAberta + "/max_dispositivos").set(novoMax).then(() => alert("Limite atualizado com sucesso!"));
        }

        function fecharModal() { document.getElementById("modal").style.display = "none"; document.getElementById("overlay").style.display = "none"; }
        
        function resetarHwid() { 
            if(dadosLocais[chaveAberta].tipo === "multi_teste") {
                if(confirm("Deseja ZERAR a contagem para todos testarem novamente?")) {
                    db.ref("keys/" + chaveAberta + "/hwids_liberados").set({ "admin_init": 0 }).then(() => { alert("Lista limpa!"); fecharModal(); });
                }
            } else {
                db.ref("keys/" + chaveAberta + "/hwid").set("").then(() => { alert("HWID Resetado!"); fecharModal(); }); 
            }
        }
        
        function excluirChave() { 
            if(confirm("Apagar permanentemente?")) db.ref("keys/" + chaveAberta).remove().then(() => fecharModal()); 
        }

        function gerarChaveComTempo() {
            const t = prompt("Validade (ex: 24 horas, 30 dias):");
            if (!t) return;
            const k = "CHETO-" + Math.random().toString(36).substring(2, 9).toUpperCase();
            let ms = t.includes("hora") ? parseInt(t)*3600000 : parseInt(t)*86400000;
            const exp = Date.now() + ms;
            db.ref("keys/" + k).set({ vendedor: auth.currentUser.email, usuario: "", hwid: "", timestamp_exp: exp, expira: new Date(exp).toLocaleString('pt-BR'), criada_em: Date.now() });
        }

        function gerarChaveTeste() {
            const min = prompt("Quantos MINUTOS cada aparelho terá de teste? (Ex: 10)");
            if (!min || isNaN(min)) return;
            const limit = prompt("QUANTAS PESSOAS podem usar essa chave no máximo? (Ex: 50)");
            if (!limit || isNaN(limit)) return;
            
            const k = "TESTE-" + Math.random().toString(36).substring(2, 7).toUpperCase();
            
            db.ref("keys/" + k).set({ 
                vendedor: auth.currentUser.email, 
                tipo: "multi_teste", 
                tempo_minutos: parseInt(min), 
                max_dispositivos: parseInt(limit),
                hwids_liberados: { "admin_init": 0 }, 
                timestamp_exp: 0, 
                expira: "Pública (Teste)", 
                criada_em: Date.now(),
                status: "Teste"
            }).then(() => alert("Chave de Teste criada com sucesso!\nCopie: " + k));
        }
    </script>
</body>
</html>
