<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gestão - Cheto Master</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --yellow: #d29922; --red: #da3633; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 8px; text-align: center; }
        .stat-card p { margin: 5px 0 0 0; font-size: 18px; font-weight: bold; }
        .search-area { background: var(--card); padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; }
        .table-res { overflow-x: auto; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 700px; }
        th { text-align: left; padding: 10px; color: #8b949e; border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid var(--border); }
        .status-badge { padding: 2px 6px; border-radius: 10px; font-size: 9px; font-weight: bold; }
        #modal { display: none; position: fixed; top:50%; left:50%; transform: translate(-50%, -50%); background: #161b22; width: 90%; max-width: 420px; border-radius: 12px; border: 1px solid var(--border); z-index: 100; padding: 20px; }
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 99; }
        input, select { background: #0d1117; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="login-screen" style="max-width:320px; margin: 80px auto; text-align: center;">
        <h2 style="color: var(--blue);">Cheto Master Login</h2>
        <input type="email" id="email" placeholder="E-mail" style="margin-bottom:10px;">
        <input type="password" id="pass" placeholder="Senha" style="margin-bottom:10px;">
        <button class="btn-action" style="background: var(--blue); color: white;" onclick="fazerLogin()">ENTRAR NO PAINEL</button>
    </div>

    <div id="main-content" class="hidden">
        <div style="margin-bottom: 15px;">
            <span id="user-welcome" style="font-size: 12px; color: var(--blue);">Bem-vindo</span>
            <button onclick="auth.signOut().then(()=>location.reload())" style="background:none; border:none; color:var(--red); cursor:pointer; font-size:10px;">[ Sair ]</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h4>Suas Chaves</h4><p id="total">0</p></div>
            <div class="stat-card"><h4>Ativas</h4><p id="ativas" style="color: var(--green)">0</p></div>
            <div class="stat-card"><h4>Pendentes</h4><p id="pendentes" style="color: var(--yellow)">0</p></div>
            <div class="stat-card"><h4>Expiradas</h4><p id="expiradas" style="color: var(--red)">0</p></div>
        </div>

        <div class="search-area">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="searchInput" placeholder="Buscar por chave ou vendedor..." onkeyup="renderizarTabela()">
                <button onclick="configurarNovaChave()" style="background:var(--green); border:none; color:white; padding:0 15px; border-radius:8px; font-weight:bold; cursor:pointer;">+ GERAR</button>
            </div>
        </div>

        <div class="table-res">
            <table>
                <thead><tr><th>CHAVE</th><th>VENDEDOR</th><th>USUÁRIO</th><th>STATUS</th><th>VENCIMENTO</th><th>AÇÃO</th></tr></thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>

    <div id="overlay" onclick="fecharModal()"></div>
    <div id="modal">
        <h3 id="m-key" style="margin:0 0 15px 0; color: var(--blue);">CHAVE</h3>
        <p style="font-size: 11px;">Vendedor: <span id="m-vendedor" style="color: var(--yellow)">---</span></p>
        <input type="text" id="new-user" placeholder="Nome do Usuário">
        <div style="display: flex; gap: 5px; margin: 10px 0;">
            <input type="number" id="ext-val" value="1">
            <select id="ext-unit">
                <option value="min">Minutos</option><option value="hor">Horas</option><option value="dia">Dias</option>
            </select>
        </div>
        <button class="btn-action" style="background: var(--green); color: white;" onclick="salvarAlteracoes()">SALVAR</button>
        <button class="btn-action" id="btn-del" style="background: var(--red); color: white;" onclick="excluirChave()">EXCLUIR</button>
        <button class="btn-action" style="background: #444; color: white;" onclick="fecharModal()">CANCELAR</button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAHTGthgkjp4Inqf6p2EpNYZ5pV1iOc6wQ",
          authDomain: "poolvipseguro.firebaseapp.com",
          databaseURL: "https://poolvipseguro-default-rtdb.firebaseio.com",
          projectId: "poolvipseguro",
          storageBucket: "poolvipseguro.firebasestorage.app",
          messagingSenderId: "628193855101",
          appId: "1:628193855101:web:6e51e13dc44fdc00a01314"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        // SUBSTITUA PELO SEU E-MAIL PARA TER ACESSO TOTAL
        const ADMIN_EMAIL = "suno69644@gmail.com"; 

        let dadosLocais = {};
        let chaveAberta = "";

        function fazerLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("E-mail ou Senha incorretos."));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-welcome').innerText = "Logado como: " + user.email;
                carregarDados();
            }
        });

        function carregarDados() {
            db.ref("keys").on("value", (snap) => {
                dadosLocais = snap.val() || {};
                renderizarTabela();
            });
        }

        function renderizarTabela() {
            const userLogado = auth.currentUser.email;
            const isAdmin = (userLogado === ADMIN_EMAIL);
            const busca = document.getElementById('searchInput').value.toLowerCase();
            const agora = Date.now();
            let t=0, a=0, e=0, p=0, html="";

            // Ordenação: Novas primeiro
            const keys = Object.keys(dadosLocais).sort((a,b) => (dadosLocais[b].criada_em || 0) - (dadosLocais[a].criada_em || 0));

            for (let id of keys) {
                let item = dadosLocais[id];
                let vendedor = item.vendedor || "Sistema";

                // FILTRO DE VENDEDOR: Se não for admin, só vê as dele
                if (!isAdmin && vendedor !== userLogado) continue;

                let t_exp = item.timestamp_exp || 0;
                let expirada = (t_exp > 0 && agora > t_exp);
                let ativa = ((item.hwid && item.hwid !== "") || (item.usuario)) && !expirada;
                let pendente = (!ativa && !expirada);

                if(expirada) e++; else if(ativa) a++; else p++;
                t++;

                if(busca && !id.toLowerCase().includes(busca) && !vendedor.toLowerCase().includes(busca)) continue;

                html += `<tr>
                    <td><b>${id}</b></td>
                    <td style="color:var(--yellow)">${vendedor.split('@')[0]}</td>
                    <td style="color:var(--blue)">${item.usuario || '---'}</td>
                    <td><span class="status-badge" style="background:${expirada?'var(--red)':ativa?'var(--green)':'var(--yellow)'}">${expirada?'Exp':ativa?'Ativa':'Pend'}</span></td>
                    <td style="color:#8b949e; font-size:9px;">${item.expira || 'N/A'}</td>
                    <td><button onclick="abrirModal('${id}')" style="background:#30363d; border:1px solid #444; color:white; padding:3px 6px; border-radius:4px; cursor:pointer;">INFO</button></td>
                </tr>`;
            }
            document.getElementById("tabela-corpo").innerHTML = html;
            document.getElementById("total").innerText = t; document.getElementById("ativas").innerText = a;
            document.getElementById("expiradas").innerText = e; document.getElementById("pendentes").innerText = p;
        }

        function configurarNovaChave() {
            const tempo = prompt("Tempo (ex: 24 horas, 30 dias):");
            if (!tempo) return;
            
            const k = "CHETO-" + Math.random().toString(36).substring(2, 9).toUpperCase();
            let ms = 86400000;
            if(tempo.includes("hora")) ms = parseInt(tempo) * 3600000;
            if(tempo.includes("dia")) ms = parseInt(tempo) * 86400000;

            const exp = Date.now() + ms;
            db.ref("keys/" + k).set({
                vendedor: auth.currentUser.email, // GRAVA QUEM CRIOU
                usuario: "",
                hwid: "",
                timestamp_exp: exp,
                expira: new Date(exp).toLocaleString('pt-BR'),
                criada_em: Date.now()
            }).then(() => alert("Gerada: " + k));
        }

        function abrirModal(id) {
            chaveAberta = id;
            let item = dadosLocais[id];
            const isAdmin = (auth.currentUser.email === ADMIN_EMAIL);
            
            document.getElementById("m-key").innerText = id;
            document.getElementById("m-vendedor").innerText = item.vendedor || "Admin";
            document.getElementById("new-user").value = item.usuario || "";
            
            // Só o dono pode excluir chaves de outros
            document.getElementById("btn-del").style.display = (isAdmin || item.vendedor === auth.currentUser.email) ? "block" : "none";

            document.getElementById("modal").style.display = "block";
            document.getElementById("overlay").style.display = "block";
        }

        function fecharModal() { document.getElementById("modal").style.display = "none"; document.getElementById("overlay").style.display = "none"; }

        function salvarAlteracoes() {
            const val = parseInt(document.getElementById("ext-val").value);
            const unit = document.getElementById("ext-unit").value;
            let addMs = 0;
            if(unit === 'min') addMs = val * 60000;
            if(unit === 'hor') addMs = val * 3600000;
            if(unit === 'dia') addMs = val * 86400000;

            const novaExp = (dadosLocais[chaveAberta].timestamp_exp || Date.now()) + addMs;
            db.ref("keys/" + chaveAberta).update({
                usuario: document.getElementById("new-user").value,
                timestamp_exp: novaExp,
                expira: new Date(novaExp).toLocaleString('pt-BR')
            }).then(() => { alert("Salvo!"); fecharModal(); });
        }

        function excluirChave() { if(confirm("Apagar?")) db.ref("keys/" + chaveAberta).remove().then(() => fecharModal()); }
    </script>
</body>
</html>
