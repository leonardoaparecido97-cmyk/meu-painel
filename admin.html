<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheto Master - Painel Vendedor</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --blue: #58a6ff; --green: #238636; --yellow: #d29922; --red: #da3633; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 8px; text-align: center; }
        .stat-card p { margin: 5px 0 0 0; font-size: 18px; font-weight: bold; }

        .search-area { background: var(--card); padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; }
        .filter-btns { display: flex; gap: 5px; margin-top: 8px; overflow-x: auto; padding-bottom: 5px; }
        .f-btn { padding: 5px 10px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: #8b949e; cursor: pointer; font-size: 11px; }
        .f-btn.active { background: var(--blue); color: white; border-color: var(--blue); }

        .table-res { overflow-x: auto; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
        th { text-align: left; padding: 10px; color: #8b949e; border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid var(--border); }
        .status-badge { padding: 2px 8px; border-radius: 10px; font-size: 9px; font-weight: bold; }

        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 99; backdrop-filter: blur(3px); }
        #modal { display: none; position: fixed; top:50%; left:50%; transform: translate(-50%, -50%); background: #161b22; width: 90%; max-width: 420px; border-radius: 12px; border: 1px solid var(--border); z-index: 100; padding: 20px; }
        
        input, select { background: #0d1117; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="login-screen" style="max-width:320px; margin: 80px auto; text-align: center;">
        <h2 style="color: var(--blue);">Cheto Admin</h2>
        <input type="email" id="email" placeholder="E-mail" style="margin-bottom:10px;">
        <input type="password" id="pass" placeholder="Senha" style="margin-bottom:10px;">
        <button class="btn-action" style="background: var(--blue); color: white;" onclick="fazerLogin()">ENTRAR</button>
    </div>

    <div id="main-content" class="hidden">
        <div class="stats-grid">
            <div class="stat-card"><h4>Total</h4><p id="total">0</p></div>
            <div class="stat-card"><h4>Ativas</h4><p id="ativas" style="color: var(--green)">0</p></div>
            <div class="stat-card"><h4>Pendentes</h4><p id="pendentes" style="color: var(--yellow)">0</p></div>
            <div class="stat-card"><h4>Expiradas</h4><p id="expiradas" style="color: var(--red)">0</p></div>
        </div>

        <div class="search-area">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="searchInput" placeholder="Buscar chave ou usuário..." onkeyup="renderizarTabela()">
                <button onclick="configurarNovaChave()" style="background:var(--green); border:none; color:white; padding:0 15px; border-radius:5px; font-weight:bold; cursor:pointer;">+ GERAR CHAVE</button>
            </div>
            <div class="filter-btns">
                <button class="f-btn active" id="f-todos" onclick="setFiltro('todos')">Todos</button>
                <button class="f-btn" id="f-ativas" onclick="setFiltro('ativas')">Ativas</button>
                <button class="f-btn" id="f-pendentes" onclick="setFiltro('pendentes')">Pendentes</button>
            </div>
        </div>

        <div class="table-res">
            <table>
                <thead><tr><th>CHAVE</th><th>USUÁRIO</th><th>STATUS</th><th>VENCIMENTO</th><th>AÇÃO</th></tr></thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>

    <div id="overlay" onclick="fecharModal()"></div>
    <div id="modal">
        <h3 id="m-key" style="margin:0 0 15px 0; color: var(--blue);">CHAVE</h3>
        <input type="text" id="new-user" placeholder="Nome do Usuário">
        <div style="display: flex; gap: 5px; margin: 10px 0;">
            <input type="number" id="ext-val" value="1">
            <select id="ext-unit">
                <option value="min">Minutos</option><option value="hor">Horas</option><option value="dia">Dias</option>
            </select>
        </div>
        <button class="btn-action" style="background: var(--green); color: white;" onclick="salvarAlteracoes()">SALVAR ALTERAÇÕES</button>
        <button class="btn-action" style="background: var(--yellow); color: #000;" onclick="resetarHwid()">RESETAR HWID (LIMPAR CELULAR)</button>
        <button class="btn-action" style="background: var(--red); color: white;" onclick="excluirChave()">EXCLUIR CHAVE</button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAHTGthgkjp4Inqf6p2EpNYZ5pV1iOc6wQ",
          authDomain: "poolvipseguro.firebaseapp.com",
          databaseURL: "https://poolvipseguro-default-rtdb.firebaseio.com",
          projectId: "poolvipseguro",
          storageBucket: "poolvipseguro.firebasestorage.app",
          messagingSenderId: "628193855101",
          appId: "1:628193855101:web:6e51e13dc44fdc00a01314"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let dadosLocais = {};
        let filtroAtivo = 'todos';
        let chaveAberta = "";

        function fazerLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Erro ao logar"));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                carregarDados();
            }
        });

        function carregarDados() {
            db.ref("keys").on("value", (snap) => {
                dadosLocais = snap.val() || {};
                renderizarTabela();
            });
        }

        function renderizarTabela() {
            const busca = document.getElementById('searchInput').value.toLowerCase();
            const agora = Date.now();
            let t=0, a=0, e=0, p=0, html="";

            // CONVERTE PARA ARRAY E ORDENA POR DATA DE CRIAÇÃO (MAIS RECENTE NO TOPO)
            const chavesOrdenadas = Object.keys(dadosLocais).sort((a, b) => {
                return (dadosLocais[b].criada_em || 0) - (dadosLocais[a].criada_em || 0);
            });

            for (let id of chavesOrdenadas) {
                let item = dadosLocais[id];
                let t_exp = item.timestamp_exp || 0;
                let user = item.usuario || "";
                
                let expirada = (t_exp > 0 && agora > t_exp);
                let ativa = ((item.hwid && item.hwid !== "") || (user !== "")) && !expirada;
                let pendente = (!ativa && !expirada);

                if(expirada) e++; else if(ativa) a++; else p++;
                t++;

                if(filtroAtivo === 'ativas' && !ativa) continue;
                if(filtroAtivo === 'pendentes' && !pendente) continue;
                if(busca && !id.toLowerCase().includes(busca) && !user.toLowerCase().includes(busca)) continue;

                html += `<tr>
                    <td><b>${id}</b></td>
                    <td style="color:var(--blue)">${user || '---'}</td>
                    <td><span class="status-badge" style="background:${expirada?'var(--red)':ativa?'var(--green)':'var(--yellow)'}">${expirada?'Expirada':ativa?'Ativa':'Pendente'}</span></td>
                    <td style="color:#8b949e; font-size:10px;">${item.expira || 'N/A'}</td>
                    <td><button onclick="abrirModal('${id}')" style="background:#30363d; border:1px solid #444; color:white; padding:4px 8px; border-radius:4px; cursor:pointer;">EDITAR</button></td>
                </tr>`;
            }
            document.getElementById("tabela-corpo").innerHTML = html;
            document.getElementById("total").innerText = t; document.getElementById("ativas").innerText = a;
            document.getElementById("expiradas").innerText = e; document.getElementById("pendentes").innerText = p;
        }

        function configurarNovaChave() {
            const tempo = prompt("Quanto tempo para essa chave? (Ex: 30 dias, 24 horas, 1 hora)");
            if (!tempo) return;
            
            const k = "CHETO-" + Math.random().toString(36).substring(2, 9).toUpperCase();
            
            // Lógica simples de tempo para a criação rápida
            let ms = 86400000; // Padrão 1 dia
            if(tempo.includes("hora")) ms = parseInt(tempo) * 3600000;
            if(tempo.includes("dia")) ms = parseInt(tempo) * 86400000;
            if(tempo.includes("min")) ms = parseInt(tempo) * 60000;

            const exp = Date.now() + ms;
            const dataTxt = new Date(exp).toLocaleString('pt-BR');

            db.ref("keys/" + k).set({
                hwid: "",
                usuario: "",
                timestamp_exp: exp,
                expira: dataTxt,
                criada_em: Date.now() // GARANTE QUE ELA APAREÇA NO TOPO
            }).then(() => {
                alert("CHAVE GERADA COM SUCESSO!\n\nCódigo: " + k + "\nValidade: " + tempo);
            });
        }

        function abrirModal(id) {
            chaveAberta = id;
            let item = dadosLocais[id];
            document.getElementById("m-key").innerText = id;
            document.getElementById("new-user").value = item.usuario || "";
            document.getElementById("modal").style.display = "block";
            document.getElementById("overlay").style.display = "block";
        }

        function fecharModal() { document.getElementById("modal").style.display = "none"; document.getElementById("overlay").style.display = "none"; }

        function salvarAlteracoes() {
            const user = document.getElementById("new-user").value;
            const val = parseInt(document.getElementById("ext-val").value);
            const unit = document.getElementById("ext-unit").value;
            let addMs = 0;
            if(unit === 'min') addMs = val * 60000;
            if(unit === 'hor') addMs = val * 3600000;
            if(unit === 'dia') addMs = val * 86400000;

            const novaExp = (dadosLocais[chaveAberta].timestamp_exp || Date.now()) + addMs;
            db.ref("keys/" + chaveAberta).update({
                usuario: user,
                timestamp_exp: novaExp,
                expira: new Date(novaExp).toLocaleString('pt-BR')
            }).then(() => { alert("Atualizado!"); fecharModal(); });
        }

        function resetarHwid() { db.ref("keys/" + chaveAberta + "/hwid").set("").then(() => alert("HWID Resetado!")); }
        function excluirChave() { if(confirm("Apagar?")) db.ref("keys/" + chaveAberta).remove().then(() => fecharModal()); }
        function setFiltro(f) { filtroAtivo = f; document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active')); document.getElementById('f-' + f).classList.add('active'); renderizarTabela(); }
    </script>
</body>
</html>
